name: Build ProjectNX

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Build NRO
    runs-on: ubuntu-24.04
    container:
      image: devkitpro/devkita64:latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Validate portable core
        run: make validate

      - name: Build ProjectNX
        run: make -j2

      - name: Create SD package
        run: |
          make package
          cd dist/projectnx
          sha256sum switch/projectnx/projectnx.nro > SHA256SUMS.txt

      - name: Verify package
        run: |
          test -s ProjectNX.nro
          test -s dist/projectnx/switch/projectnx/projectnx.nro
          test -s dist/projectnx/switch/projectnx/config.ini
          grep -q '^client_id=d283012d-6560-413a-be24-f7563c1a7467$' \
            dist/projectnx/switch/projectnx/config.ini
          test -s dist/projectnx/SHA256SUMS.txt
          python3 - <<'PY'
          from pathlib import Path
          from struct import unpack_from

          nro = Path("ProjectNX.nro").read_bytes()
          assert nro[0x10:0x14] == b"NRO0", "cabecalho NRO0 ausente"
          nro_size = unpack_from("<I", nro, 0x18)[0]
          assert nro[nro_size:nro_size + 4] == b"ASET", "metadados ASET ausentes"
          assert b"ProjectNX Contributors" in nro, "NACP do ProjectNX ausente"
          PY

      - name: Upload installable package
        uses: actions/upload-artifact@v7
        with:
          name: ProjectNX-v0.3.0-preview
          path: dist/projectnx
          if-no-files-found: error
          retention-days: 30
          compression-level: 9
